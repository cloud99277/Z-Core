schema_version: "1.0"
name: url-translate-publish
description: 获取网页内容、翻译、发布到微信

variables:
  - name: URL
    description: 网页 URL
    required: true

steps:
  - skill: baoyu-url-to-markdown
    input:
      url: "$URL"
    output: content.md

  - skill: translate
    input:
      file: content.md
      to: zh-CN
      mode: normal
    output: translation.md

  - skill: baoyu-post-to-wechat
    input:
      file: translation.md
